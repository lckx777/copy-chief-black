    # ------------------------------------------
    # ANTI-PATTERNS (evitar em concursos)
    # ------------------------------------------
    anti_patterns:

      - pattern: "EST abaixo de 8 com blind_critic acima de 8 — gap de articulacao narrativa"
        frequency: "2/6 ofertas com dados (33%)"
        evidence:
          - "gabaritando-portugues: BC MUP 9.0, BC MUS 8.0, EST 5.8 — gap severo"
          - "decifra-lei-seca: BC MUP 8.6, BC MUS 8.0, EST genericidade 9.0 — corrigido com CreativeDC"
        injection: "SE blind_critic >= 8 e EST < 8: problema NAO e o mecanismo. E a NARRATIVA. Solucao: adicionar cenas vividas (noite antes da prova, momento do resultado, conversa com familia). Rewrite focando em emocao, nao conteudo."

      - pattern: "Copy de concursos sem cenas vividas do avatar (apenas dados e estatisticas)"
        frequency: "Correlacionado com todos os EST < 8"
        injection: "NUNCA produzir copy de concursos apenas com dados estatisticos. OBRIGATORIO: pelo menos 3 cenas vividas com detalhes sensoriais (horario, local, sensacao fisica). Dados sem emocao = EST baixo."

      - pattern: "Genericidade abaixo de 6 na copy"
        evidence:
          - "gabaritando-portugues EST 5.8 — pior score do portfolio"
        injection: "Genericidade < 6 = copy que concorrente usaria sem alterar. OBRIGATORIO: nome proprietario do mecanismo, numeros por banca, exemplos unicos. Logo Test: trocar logo → se funciona → REFAZER."

      - pattern: "Mecanismo sem espelhamento MUP/MUS (problema e solucao desconectados)"
        injection: "MUP e MUS DEVEM ser espelhos. Se nao ha inversao clara (cego->radar, eliminacao->decodificacao), o mecanismo esta INCOMPLETO. Refazer MUS como inversao do MUP."

      - pattern: "Solucoes falsas atacadas genericamente em vez de com razao especifica"
        injection: "NUNCA descredibilizar solucao falsa com 'nao funciona'. SEMPRE com razao especifica: 'Cursinhos NAO ensinam padroes de banca porque usam material GENERICO igual pra CEBRASPE e FCC'. Especificidade da critica = credibilidade."

