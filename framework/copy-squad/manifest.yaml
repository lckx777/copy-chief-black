# =============================================================================
# MULTI-EXPERT COMBOS (For complex deliverables)
# =============================================================================

combos:
  vsl_full:
    experts: [schwartz, brown, sugarman, halbert, kennedy]
    flow: "Schwartz(headline) > Brown(mechanism) > Sugarman(body) > Halbert(bullets) > Kennedy(close)"

  landing_page:
    experts: [schwartz, collier, brown, halbert, kennedy]
    flow: "Schwartz(headline) > Collier(entry) > Brown(mechanism) > Halbert(bullets) > Kennedy(close)"

  email_sequence:
    experts: [chaperon, sugarman, halbert, kennedy]
    flow: "Chaperon(arc) > Sugarman(flow) > Halbert(subject+hooks) > Kennedy(close)"

  criativo_ad:
    experts: [caples, halbert, kern]
    flow: "Caples(headline+test) > Halbert(hook+specificity) > Kern(personality)"

  launch_funnel:
    experts: [ry_schwartz, kern, chaperon, kennedy]
    flow: "RySchwartz(architecture) > Kern(personality) > Chaperon(emails) > Kennedy(close)"
