# Copy Squad Voice DNA - Manifest v2.0
# 25 expert copywriters organized by tier with Copy Chief orchestrator
# Each expert injects ~200-300 tokens of voice patterns

version: "2.0"
total_experts: 25

# =============================================================================
# TIER SYSTEM
# =============================================================================

tiers:
  T0_DIAGNOSIS:
    description: "Market analysis and strategic mapping BEFORE writing"
    experts: [schwartz, collier, ogilvy, cialdini]
  T1_STRATEGIC:
    description: "Big idea, mechanism, positioning, campaign architecture"
    experts: [brown, bencivenga, reeves, makepeace, abraham, hormozi]
  T2_EXECUTION:
    description: "Writing the copy itself: hooks, body, bullets, close"
    experts: [halbert, sugarman, kennedy, caples, carlton, chaperon, kern, agora, sabri, brunson]
  T3_SPECIALIZED:
    description: "Specialized formats: launches, cohorts, cross-promos, social"
    experts: [ry_schwartz, powers, vaynerchuk, marcondes]
  AUDIT:
    description: "Final validation, testing frameworks, accountability"
    experts: [hopkins]

# =============================================================================
# COPY CHIEF DECISION TREE
# =============================================================================

copy_chief:
  file: "copy-chief.md"
  role: "Orchestrator -- auto-selects expert(s) per task"
  decision_tree:
    headline_big_idea: [schwartz, brown]
    bullets_hooks: [halbert, caples]
    email_sequence: [chaperon, carlton]
    vsl_body: [sugarman, kennedy]
    unique_mechanism: [brown]
    criativo_ad: [kern, caples, halbert, sabri]
    launch_cohort: [ry_schwartz, brunson]
    offer_stack: [brown, kennedy, hormozi]
    lead_generation: [halbert, collier]
    story_narrative: [sugarman, chaperon, brunson]
    guarantee_close: [kennedy]
    usp_positioning: [reeves, bencivenga]
    research_testing: [ogilvy, hopkins]
    review_final: [hopkins]
    influence_audit: [cialdini]
    jv_cross_promo: [abraham, ry_schwartz]
    social_content: [vaynerchuk, kern]
    financial_promo: [agora, makepeace]
    grand_slam_offer: [hormozi, brown]
    webinar_script: [brunson, kern]
    funnel_architecture: [brunson, ry_schwartz]
    high_volume_testing: [sabri, caples, hopkins]
    marketing_juridico: [marcondes]
    authority_building: [marcondes, vaynerchuk]
    ia_content: [marcondes]
    launch_funnel_juridico: [marcondes, brunson, ry_schwartz]

