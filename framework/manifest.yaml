# ─── OBSERVABILITY ────────────────────────────────────────────────────
#
# Metrics, dashboards, and monitoring for the orchestration system.
# Dashboard scripts are in ~/.claude/dashboard/ and ~/.claude/dashboard-v2/
# ─────────────────────────────────────────────────────────────────────

observability:
  dashboard:
    enabled: true
    dir: "~/.claude/dashboard-v2"
    script: "~/.claude/scripts/pipeline-viz.ts"

  metrics:
    - id: offers_active
      description: "Number of offers in non-IDLE state"
      source: "count helix-state.yaml where phase != IDLE"

    - id: avg_blind_critic
      description: "Mean blind_critic score across all validated copy"
      source: "aggregate blind_critic results"

    - id: avg_est
      description: "Mean emotional_stress_test score"
      source: "aggregate EST results"

    - id: pipeline_throughput
      description: "Offers moved to DELIVERED per week"
      source: "count phase transitions to DELIVERED"

    - id: token_efficiency
      description: "Tokens spent per deliverable produced"
      source: "session token usage / deliverables count"

    - id: gate_pass_rate
      description: "Percentage of gates passed on first attempt"
      source: "gate-tracker results"

    - id: self_healing_queue
      description: "Items currently in retry queue"
      source: "~/.claude/knowledge/retry-queue.yaml"

  telemetry:
    dir: "~/.claude/telemetry"
    journey_log: "~/.claude/hooks/journey-log.ts"

# ─── ANTI-HOMOGENEIZATION ────────────────────────────────────────────
#
# Rules to prevent AI-generated copy from converging to generic patterns.
# Ref: ~/.claude/rules/anti-homogeneization.md for full cliche lists.
# ─────────────────────────────────────────────────────────────────────

anti_homogeneization:
  ref: "~/.claude/rules/anti-homogeneization.md"

  specificity_threshold: 8  # Score < 8 = REFAZER immediately
  logo_test: required       # Copy must fail logo test (unique enough)
  competitor_swap: required  # Competitor cannot use without changes

  tests:
    - logo_test
    - competitor_swap_test
    - specificity_score_face_1  # Data: >= 6/8
    - specificity_score_face_2  # Narrative: >= 3/5

# ─── MEMORY SYSTEMS ──────────────────────────────────────────────────
#
# Dual memory: claude-mem (automatic) + RLM Server (manual/critical).
# Both MUST be consulted at session start and saved before /compact.
# ─────────────────────────────────────────────────────────────────────

memory:
  systems:
    claude_mem:
      type: automatic
      search_on_start: true
      tools: [search, timeline, get_observations]

    rlm_server:
      type: manual
      tools: [rlm_chunk, rlm_list_chunks, rlm_peek, rlm_grep, rlm_recall]
      chunk_before_compact: true  # MANDATORY before /compact

  session_state:
    dir: "~/.claude/session-state"
    file: "~/.claude/session-state/current-session.json"
    volatile: true  # Expires in 2h

  offer_state:
    file_per_offer: "{offer}/helix-state.yaml"
    persistent: true  # Source of truth for tool tracking

# ─── OFFER STATE SCHEMA ──────────────────────────────────────────────
#
# Each offer has a helix-state.yaml that tracks phase, tools used,
# gates passed, and mecanismo state. This is the PERSISTENT source
# of truth (not session state).
# ─────────────────────────────────────────────────────────────────────

offer_state:
  schema: "~/.claude/schemas/helix-state.schema.yaml"
  template: "~/.claude/templates/helix-state-template.yaml"
  phases: [IDLE, RESEARCH, BRIEFING, PRODUCTION, DELIVERED]
  transitions:
    IDLE: [RESEARCH]
    RESEARCH: [BRIEFING]
    BRIEFING: [PRODUCTION]
    PRODUCTION: [DELIVERED]
    DELIVERED: []

# ─── SCRIPTS ──────────────────────────────────────────────────────────
#
# Key scripts for system operations.
# ─────────────────────────────────────────────────────────────────────

scripts:
  pipeline_executor: "~/.claude/scripts/pipeline-executor.ts"
  pipeline_daemon: "~/.claude/scripts/pipeline-daemon.ts"
  decision_engine: "~/.claude/scripts/decision-engine.ts"
  skill_dispatcher: "~/.claude/scripts/skill-dispatcher.ts"
  task_classifier: "~/.claude/scripts/task-classifier.ts"
  copy_chief_router: "~/.claude/scripts/copy-chief-router.ts"
  health_check: "~/.claude/scripts/health-check.ts"
  clickup_sync: "~/.claude/scripts/clickup-sync-engine.ts"
  agent_context: "~/.claude/scripts/agent-context.ts"
  generate_manifest: "~/.claude/scripts/generate-manifest.sh"
  generate_registry: "~/.claude/scripts/generate-registry.sh"

# ─── META ─────────────────────────────────────────────────────────────

meta:
  created: "2026-02-26"
  updated: "2026-02-26"
  author: "Copy Chief BLACK"
  purpose: |
    Single source of truth for the entire Copy Chief BLACK orchestration
    system. Replaces distributed config across 15+ files with one
    centralized, human-readable, machine-parseable manifest.

    Other files that reference this manifest:
    - CLAUDE.md (operational config — reads agent triggers from here)
    - synapse-manifest.yaml (context engine — phase rules defined here)
    - helix-pipeline.yaml (workflow detail — steps summarized here)
    - registry.yaml (auto-generated inventory — agents listed here)
    - settings.json (hook config — hook registry defined here)

  subordinate_configs:
    - "~/.claude/synapse-manifest.yaml"    # Context engine layers
    - "~/.claude/workflows/helix-pipeline.yaml"  # Detailed sub-phases
    - "~/.claude/registry.yaml"            # Auto-generated inventory
    - "~/.claude/.version"                 # Ecosystem version
